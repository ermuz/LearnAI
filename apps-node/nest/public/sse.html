<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI SSE Chat 测试</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        padding: 24px 16px;
      }
      .shell {
        width: 100%;
        max-width: 760px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      .card {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
        padding: 16px 18px 18px;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: #6b7280;
      }
      input[type='text'],
      textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-family: inherit;
        font-size: 14px;
        outline: none;
      }
      input[type='text'] {
        padding: 8px 10px;
        margin-bottom: 10px;
      }
      textarea {
        min-height: 88px;
        padding: 8px 10px;
        resize: vertical;
      }
      input:focus,
      textarea:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3);
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid #2563eb;
        background: #3b82f6;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .status {
        font-size: 12px;
        color: #6b7280;
      }
      .output {
        margin-top: 16px;
        padding: 10px;
        border-radius: 8px;
        background: #111827;
        color: #e5e7eb;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
        white-space: pre-wrap;
        min-height: 140px;
        max-height: 360px;
        overflow-y: auto;
      }
      .output:empty::before {
        content: '回复将显示在这里...';
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <h1>AI SSE Chat 测试</h1>

        <label for="apiBase">API 根地址（无尾斜杠）</label>
        <input
          id="apiBase"
          type="text"
          value="http://127.0.0.1:3000"
          placeholder="http://127.0.0.1:3000"
        />

        <label for="query">输入你的问题</label>
        <textarea
          id="query"
          placeholder="请输入要发送给 AI 的问题..."
        ></textarea>

        <div class="controls">
          <button id="sendBtn" type="button">开始对话（SSE）</button>
          <button id="stopBtn" type="button">停止</button>
          <div class="status" id="status">状态：待机</div>
        </div>

        <div class="output" id="output"></div>
      </div>
    </div>

    <script>
      const apiBaseInput = document.getElementById('apiBase');
      const sendBtn = document.getElementById('sendBtn');
      const stopBtn = document.getElementById('stopBtn');
      const queryInput = document.getElementById('query');
      const outputEl = document.getElementById('output');
      const statusEl = document.getElementById('status');

      let es = null;

      function closeEventSource() {
        if (es) {
          es.close();
          es = null;
        }
        sendBtn.disabled = false;
      }

      function openSse() {
        const query = queryInput.value.trim();
        const base = apiBaseInput.value.trim().replace(/\/$/, '');
        if (!query) {
          alert('请输入问题');
          return;
        }
        if (!base) {
          alert('请输入 API 根地址');
          return;
        }

        closeEventSource();
        outputEl.textContent = '';
        sendBtn.disabled = true;
        statusEl.textContent = '状态：连接中...';

        const url = new URL('/api/ai/chat/stream', base);
        url.searchParams.set('query', query);
        es = new EventSource(url.toString());

        es.onopen = () => {
          statusEl.textContent = '状态：已连接，流式接收中...';
        };

        es.onmessage = (event) => {
          outputEl.textContent += event.data;
        };

        es.addEventListener('done', () => {
          statusEl.textContent = '状态：完成';
          closeEventSource();
        });

        es.onerror = () => {
          statusEl.textContent = '状态：连接结束或发生错误';
          closeEventSource();
        };
      }

      sendBtn.addEventListener('click', openSse);
      stopBtn.addEventListener('click', () => {
        statusEl.textContent = '状态：已手动停止';
        closeEventSource();
      });
      window.addEventListener('beforeunload', closeEventSource);
    </script>
  </body>
</html>
